<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartNotes AI Pro - Ultimate AI-Powered Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #252525;
  --border: #2a2a2a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --ai-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Auth Container */
.auth-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}

.auth-card {
  background: var(--bg-card);
  padding: 3rem;
  border-radius: 16px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.auth-title {
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: var(--ai-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.auth-subtitle {
  color: var(--text-secondary);
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1.5rem;
  text-align: left;
}

.form-label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 500;
  color: var(--text-primary);
}

.form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 1rem;
  transition: all 0.2s ease;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.auth-button {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--ai-gradient);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 1rem;
}

.auth-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
}

.auth-link {
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

.auth-link:hover {
  color: var(--accent-hover);
}

.error-message {
  color: var(--danger);
  font-size: 0.875rem;
  margin-top: 0.5rem;
  display: none;
}

/* App Container */
.app-container {
  display: none;
  min-height: 100vh;
}

/* Header */
.app-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 1000;
}

.app-logo {
  font-size: 1.25rem;
  font-weight: 700;
  background: var(--ai-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.user-menu {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.user-avatar {
  width: 32px;
  height: 32px;
  background: var(--ai-gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 0.875rem;
}

.logout-button {
  padding: 0.5rem 1rem;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 0.875rem;
  cursor: pointer;
  transition: all 0.2s ease;
}

.logout-button:hover {
  background: var(--danger);
  border-color: var(--danger);
}

/* Main Content */
.main-content {
  margin-top: 60px;
  padding: 2rem;
  display: flex;
  gap: 2rem;
  min-height: calc(100vh - 60px);
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--bg-secondary);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 1.5rem;
  height: fit-content;
}

.sidebar-section {
  margin-bottom: 2rem;
}

.sidebar-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 1rem;
}

.sidebar-button {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 0.875rem;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: 0.5rem;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.sidebar-button:hover {
  background: var(--accent);
  border-color: var(--accent);
}

/* Notes Area */
.notes-area {
  flex: 1;
  background: var(--bg-secondary);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 1.5rem;
}

.notes-header {
  display: flex;
  align-items: center;
  justify-content: between;
  margin-bottom: 2rem;
}

.notes-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 1rem;
}

.note-input {
  width: 100%;
  min-height: 200px;
  padding: 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 1rem;
  line-height: 1.6;
  resize: vertical;
  font-family: inherit;
}

.note-input:focus {
  outline: none;
  border-color: var(--accent);
}

.notes-list {
  margin-top: 2rem;
}

.note-item {
  background: var(--bg-card);
  padding: 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-bottom: 1rem;
  cursor: pointer;
  transition: all 0.2s ease;
}

.note-item:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.note-meta {
  display: flex;
  align-items: center;
  justify-content: between;
  margin-bottom: 0.5rem;
  font-size: 0.875rem;
  color: var(--text-secondary);
}

.note-preview {
  color: var(--text-primary);
  line-height: 1.5;
}

/* Hidden class */
.hidden {
  display: none !important;
}

/* Responsive */
@media (max-width: 768px) {
  .main-content {
    flex-direction: column;
    padding: 1rem;
  }
  
  .sidebar {
    width: 100%;
  }
  
  .auth-card {
    margin: 1rem;
    padding: 2rem;
  }
}

/* Loading animation */
.loading {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-radius: 50%;
  border-top-color: var(--accent);
  animation: spin 0.8s ease-in-out infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<!-- Auth Container -->
<div id="authContainer" class="auth-container">
  <div class="auth-card">
    <div id="loginForm">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your SmartNotes account</p>
      
      <form id="loginFormElement">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="form-input" required>
          <div class="error-message" id="loginEmailError"></div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="form-input" required>
          <div class="error-message" id="loginPasswordError"></div>
        </div>
        
        <button type="submit" class="auth-button" id="loginButton">
          Sign In
        </button>
      </form>
      
      <p>
        Don't have an account? 
        <a href="#" class="auth-link" onclick="showSignup()">Sign up</a>
      </p>
    </div>
    
    <div id="signupForm" class="hidden">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join SmartNotes and boost your productivity</p>
      
      <form id="signupFormElement">
        <div class="form-group">
          <label class="form-label" for="signupName">Full Name</label>
          <input type="text" id="signupName" class="form-input" required>
          <div class="error-message" id="signupNameError"></div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email</label>
          <input type="email" id="signupEmail" class="form-input" required>
          <div class="error-message" id="signupEmailError"></div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <input type="password" id="signupPassword" class="form-input" required>
          <div class="error-message" id="signupPasswordError"></div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" class="form-input" required>
          <div class="error-message" id="signupConfirmPasswordError"></div>
        </div>
        
        <button type="submit" class="auth-button" id="signupButton">
          Create Account
        </button>
      </form>
      
      <p>
        Already have an account? 
        <a href="#" class="auth-link" onclick="showLogin()">Sign in</a>
      </p>
    </div>
  </div>
</div>

<!-- App Container -->
<div id="appContainer" class="app-container">
  <!-- Header -->
  <header class="app-header">
    <div class="app-logo">SmartNotes AI Pro</div>
    <div class="user-menu">
      <div class="user-avatar" id="userAvatar">U</div>
      <span id="userName">User</span>
      <button class="logout-button" onclick="logout()">Logout</button>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main-content">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">Quick Actions</h3>
        <button class="sidebar-button" onclick="createNewNote()">
          📝 New Note
        </button>
        <button class="sidebar-button" onclick="searchNotes()">
          🔍 Search Notes
        </button>
        <button class="sidebar-button" onclick="viewFavorites()">
          ⭐ Favorites
        </button>
      </div>
      
      <div class="sidebar-section">
        <h3 class="sidebar-title">Categories</h3>
        <button class="sidebar-button" onclick="filterByCategory('work')">
          💼 Work
        </button>
        <button class="sidebar-button" onclick="filterByCategory('personal')">
          🏠 Personal
        </button>
        <button class="sidebar-button" onclick="filterByCategory('ideas')">
          💡 Ideas
        </button>
        <button class="sidebar-button" onclick="filterByCategory('archive')">
          📦 Archive
        </button>
      </div>
      
      <div class="sidebar-section">
        <h3 class="sidebar-title">AI Tools</h3>
        <button class="sidebar-button" onclick="aiSummarize()">
          🤖 AI Summarize
        </button>
        <button class="sidebar-button" onclick="aiGenerate()">
          ✨ Generate Ideas
        </button>
        <button class="sidebar-button" onclick="aiOrganize()">
          📊 Auto-Organize
        </button>
      </div>
    </aside>
    
    <!-- Notes Area -->
    <section class="notes-area">
      <div class="notes-header">
        <h2 class="notes-title">My Notes</h2>
      </div>
      
      <textarea 
        id="noteInput" 
        class="note-input" 
        placeholder="Start typing your note... (Ctrl+S to save)"
      ></textarea>
      
      <div class="notes-list" id="notesList">
        <!-- Notes will be dynamically loaded here -->
      </div>
    </section>
  </main>
</div>

<script>
class SmartNotesAuth {
  constructor() {
    this.currentUser = null;
    this.notes = [];
    this.init();
  }
  
  init() {
    // Check for existing session
    const savedUser = localStorage.getItem('smartnotes_user');
    if (savedUser) {
      this.currentUser = JSON.parse(savedUser);
      this.showApp();
      this.loadUserNotes();
    } else {
      this.showAuth();
    }
    
    // Setup form listeners
    this.setupFormListeners();
    
    // Setup keyboard shortcuts
    this.setupKeyboardShortcuts();
  }
  
  setupFormListeners() {
    document.getElementById('loginFormElement').addEventListener('submit', (e) => {
      e.preventDefault();
      this.handleLogin();
    });
    
    document.getElementById('signupFormElement').addEventListener('submit', (e) => {
      e.preventDefault();
      this.handleSignup();
    });
  }
  
  setupKeyboardShortcuts() {
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        this.saveCurrentNote();
      }
      
      if (e.ctrlKey && e.key === 'n') {
        e.preventDefault();
        this.createNewNote();
      }
    });
  }
  
  async handleLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    // Clear previous errors
    this.clearErrors(['loginEmailError', 'loginPasswordError']);
    
    // Basic validation
    if (!email || !password) {
      this.showError('loginEmailError', 'Please fill in all fields');
      return;
    }
    
    // Show loading
    const button = document.getElementById('loginButton');
    button.innerHTML = '<div class="loading"></div> Signing in...';
    button.disabled = true;
    
    try {
      // Simulate API call
      await this.delay(1000);
      
      // Check if user exists (simplified - in production, use real authentication)
      const users = JSON.parse(localStorage.getItem('smartnotes_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      
      if (!user) {
        this.showError('loginPasswordError', 'Invalid email or password');
        return;
      }
      
      // Login successful
      this.currentUser = {
        id: user.id,
        name: user.name,
        email: user.email,
        avatar: user.name.charAt(0).toUpperCase()
      };
      
      localStorage.setItem('smartnotes_user', JSON.stringify(this.currentUser));
      this.showApp();
      this.loadUserNotes();
      
    } catch (error) {
      this.showError('loginPasswordError', 'Login failed. Please try again.');
    } finally {
      button.innerHTML = 'Sign In';
      button.disabled = false;
    }
  }
  
  async handleSignup() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('signupConfirmPassword').value;
    
    // Clear previous errors
    this.clearErrors(['signupNameError', 'signupEmailError', 'signupPasswordError', 'signupConfirmPasswordError']);
    
    // Validation
    if (!name || !email || !password || !confirmPassword) {
      this.showError('signupNameError', 'Please fill in all fields');
      return;
    }
    
    if (password !== confirmPassword) {
      this.showError('signupConfirmPasswordError', 'Passwords do not match');
      return;
    }
    
    if (password.length < 6) {
      this.showError('signupPasswordError', 'Password must be at least 6 characters');
      return;
    }
    
    // Show loading
    const button = document.getElementById('signupButton');
    button.innerHTML = '<div class="loading"></div> Creating account...';
    button.disabled = true;
    
    try {
      // Simulate API call
      await this.delay(1500);
      
      // Check if user already exists
      const users = JSON.parse(localStorage.getItem('smartnotes_users') || '[]');
      if (users.find(u => u.email === email)) {
        this.showError('signupEmailError', 'Account with this email already exists');
        return;
      }
      
      // Create new user
      const newUser = {
        id: Date.now().toString(),
        name,
        email,
        password,
        created: new Date().toISOString()
      };
      
      users.push(newUser);
      localStorage.setItem('smartnotes_users', JSON.stringify(users));
      
      // Auto login
      this.currentUser = {
        id: newUser.id,
        name: newUser.name,
        email: newUser.email,
        avatar: newUser.name.charAt(0).toUpperCase()
      };
      
      localStorage.setItem('smartnotes_user', JSON.stringify(this.currentUser));
      this.showApp();
      this.loadUserNotes();
      
    } catch (error) {
      this.showError('signupEmailError', 'Signup failed. Please try again.');
    } finally {
      button.innerHTML = 'Create Account';
      button.disabled = false;
    }
  }
  
  showAuth() {
    document.getElementById('authContainer').style.display = 'flex';
    document.getElementById('appContainer').style.display = 'none';
  }
  
  showApp() {
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    
    // Update user info in header
    document.getElementById('userAvatar').textContent = this.currentUser.avatar;
    document.getElementById('userName').textContent = this.currentUser.name;
  }
  
  logout() {
    localStorage.removeItem('smartnotes_user');
    this.currentUser = null;
    this.notes = [];
    this.showAuth();
    
    // Clear forms
    document.getElementById('loginFormElement').reset();
    document.getElementById('signupFormElement').reset();
  }
  
  loadUserNotes() {
    const userNotes = JSON.parse(localStorage.getItem(`smartnotes_notes_${this.currentUser.id}`) || '[]');
    this.notes = userNotes;
    this.renderNotes();
  }
  
  saveUserNotes() {
    localStorage.setItem(`smartnotes_notes_${this.currentUser.id}`, JSON.stringify(this.notes));
  }
  
  renderNotes() {
    const notesList = document.getElementById('notesList');
    
    if (this.notes.length === 0) {
      notesList.innerHTML = `
        <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
          <p>No notes yet. Create your first note above!</p>
        </div>
      `;
      return;
    }
    
    notesList.innerHTML = this.notes.map(note => `
      <div class="note-item" onclick="loadNote('${note.id}')">
        <div class="note-meta">
          <span>${new Date(note.created).toLocaleDateString()}</span>
          <span>${note.category || 'General'}</span>
        </div>
        <div class="note-preview">
          ${note.content.substring(0, 200)}${note.content.length > 200 ? '...' : ''}
        </div>
      </div>
    `).join('');
  }
  
  saveCurrentNote() {
    const content = document.getElementById('noteInput').value.trim();
    
    if (!content) {
      this.showNotification('Please write something first!', 'warning');
      return;
    }
    
    const note = {
      id: Date.now().toString(),
      content,
      created: new Date().toISOString(),
      updated: new Date().toISOString(),
      category: 'general'
    };
    
    this.notes.unshift(note);
    this.saveUserNotes();
    this.renderNotes();
    
    document.getElementById('noteInput').value = '';
    this.showNotification('Note saved successfully!', 'success');
  }
  
  createNewNote() {
    document.getElementById('noteInput').value = '';
    document.getElementById('noteInput').focus();
  }
  
  showError(elementId, message) {
    const errorElement = document.getElementById(elementId);
    errorElement.textContent = message;
    errorElement.style.display = 'block';
  }
  
  clearErrors(errorIds) {
    errorIds.forEach(id => {
      const errorElement = document.getElementById(id);
      errorElement.style.display = 'none';
    });
  }
  
  showNotification(message, type = 'info') {
    // Simple notification - you could enhance this with a proper notification system
    console.log(`${type.toUpperCase()}: ${message}`);
  }
  
  delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
}

// Global functions for button clicks
function showLogin() {
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('signupForm').classList.add('hidden');
}

function showSignup() {
  document.getElementById('signupForm').classList.remove('hidden');
  document.getElementById('loginForm').classList.add('hidden');
}

function logout() {
  app.logout();
}

function createNewNote() {
  app.createNewNote();
}

function loadNote(noteId) {
  const note = app.notes.find(n => n.id === noteId);
  if (note) {
    document.getElementById('noteInput').value = note.content;
  }
}

// Placeholder functions for sidebar buttons
function searchNotes() { console.log('Search notes...'); }
function viewFavorites() { console.log('View favorites...'); }
function filterByCategory(category) { console.log('Filter by:', category); }
function aiSummarize() { console.log('AI Summarize...'); }
function aiGenerate() { console.log('AI Generate...'); }
function aiOrganize() { console.log('AI Organize...'); }

// Initialize app
const app = new SmartNotesAuth();

// Demo users for testing
if (!localStorage.getItem('smartnotes_users')) {
  const demoUsers = [
    {
      id: '1',
      name: 'Demo User',
      email: 'demo@smartnotes.com',
      password: 'demo123',
      created: new Date().toISOString()
    }
  ];
  localStorage.setItem('smartnotes_users', JSON.stringify(demoUsers));
}
</script>

</body>
</html>
