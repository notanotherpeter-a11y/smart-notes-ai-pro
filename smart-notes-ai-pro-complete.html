<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartNotes AI Pro - Voice AI Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --bg-hover: #252525;
  --border: #2a2a2a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --ai-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
  --admin-gradient: linear-gradient(135deg, #ef4444, #f59e0b);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Voice Controls */
.voice-controls {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 1rem;
}

@media (max-width: 768px) {
  .voice-controls {
    flex-direction: column;
    gap: 0.75rem;
  }
}

.voice-button {
  flex-shrink: 0;
  width: 60px;
  height: 60px;
  border: none;
  border-radius: 50%;
  background: var(--ai-gradient);
  color: var(--text-primary);
  font-size: 1.5rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.voice-button:hover {
  transform: scale(1.05);
}

.voice-button.listening {
  animation: pulse 1.5s infinite;
  background: var(--success);
}

.voice-button.processing {
  background: var(--warning);
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
  100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}

.voice-status {
  flex-grow: 1;
  color: var(--text-secondary);
  font-size: 0.875rem;
}

.voice-status.listening {
  color: var(--success);
  font-weight: 500;
}

.voice-status.processing {
  color: var(--warning);
  font-weight: 500;
}

/* App Container */
.app-container {
  width: 100%;
  min-height: 100vh;
  padding: 2rem;
  background: var(--bg-primary);
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.app-title {
  font-size: 2rem;
  font-weight: 700;
  background: var(--ai-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logout-btn {
  padding: 0.5rem 1rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
}

.logout-btn:hover {
  background: var(--bg-hover);
}

/* Note Input */
.note-input-section {
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border);
}

.note-input {
  width: 100%;
  min-height: 120px;
  padding: 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 1rem;
  resize: vertical;
  outline: none;
  margin-bottom: 1rem;
}

.note-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.input-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.quick-buttons {
  display: flex;
  gap: 0.5rem;
}

.quick-btn {
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 6px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.2s;
}

.quick-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.char-count {
  color: var(--text-muted);
  font-size: 0.75rem;
}

.add-note-btn {
  padding: 0.75rem 2rem;
  background: var(--ai-gradient);
  border: none;
  border-radius: 8px;
  color: var(--text-primary);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.add-note-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
}

/* Notes Grid */
.notes-container {
  display: grid;
  gap: 1rem;
}

.note-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  transition: all 0.2s;
}

.note-item:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}

.note-item.voice {
  border-left: 4px solid var(--success);
}

.note-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.note-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  font-size: 0.75rem;
}

.note-type {
  background: var(--success);
  color: white;
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
  font-size: 0.625rem;
  font-weight: 500;
}

.note-content {
  color: var(--text-primary);
  line-height: 1.6;
  margin-bottom: 1rem;
}

.note-actions {
  display: flex;
  gap: 0.5rem;
}

.note-action-btn {
  padding: 0.25rem 0.5rem;
  border: none;
  border-radius: 4px;
  background: var(--bg-secondary);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.75rem;
  transition: all 0.2s;
}

.note-action-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.delete-btn:hover {
  background: var(--danger);
  color: white;
}

/* Notification */
.notification {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  padding: 1rem 1.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 1000;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  max-width: 350px;
}

.notification.show {
  transform: translateX(0);
}

.notification.success { border-left: 4px solid var(--success); }
.notification.error { border-left: 4px solid var(--danger); }
.notification.warning { border-left: 4px solid var(--warning); }
.notification.info { border-left: 4px solid var(--info); }

/* Auth Container */
.auth-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: var(--bg-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.auth-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 3rem;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.auth-title {
  font-size: 2rem;
  font-weight: 700;
  background: var(--ai-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.5rem;
}

.auth-subtitle {
  color: var(--text-secondary);
  margin-bottom: 2rem;
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.auth-input {
  padding: 1rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 1rem;
  outline: none;
}

.auth-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.auth-button {
  padding: 1rem 2rem;
  background: var(--ai-gradient);
  border: none;
  border-radius: 8px;
  color: var(--text-primary);
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}

.auth-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
}

.auth-switch {
  margin-top: 1rem;
  color: var(--text-secondary);
}

.auth-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}

.auth-link:hover {
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
  .app-container {
    padding: 1rem;
  }
  
  .app-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
  }
  
  .app-title {
    font-size: 1.5rem;
  }
  
  .input-actions {
    flex-direction: column;
    align-items: stretch;
  }
  
  .quick-buttons {
    justify-content: center;
    flex-wrap: wrap;
  }
}
</style>
</head>
<body>

<!-- Auth Container -->
<div class="auth-container" id="authContainer">
  <div class="auth-box">
    <h1 class="auth-title">SmartNotes AI Pro</h1>
    <p class="auth-subtitle">Voice AI Edition</p>
    
    <!-- Login Form -->
    <div id="loginForm">
      <form class="auth-form" id="loginFormElement">
        <input type="email" class="auth-input" placeholder="Email" required id="loginEmail">
        <input type="password" class="auth-input" placeholder="Password" required id="loginPassword">
        <button type="submit" class="auth-button">Sign In</button>
      </form>
      <p class="auth-switch">
        Don't have an account? 
        <span class="auth-link" onclick="showSignup()">Sign up</span>
      </p>
    </div>
    
    <!-- Signup Form -->
    <div id="signupForm" style="display: none;">
      <form class="auth-form" id="signupFormElement">
        <input type="text" class="auth-input" placeholder="Full Name" required id="signupName">
        <input type="email" class="auth-input" placeholder="Email" required id="signupEmail">
        <input type="password" class="auth-input" placeholder="Password" required id="signupPassword">
        <button type="submit" class="auth-button">Create Account</button>
      </form>
      <p class="auth-switch">
        Already have an account? 
        <span class="auth-link" onclick="showLogin()">Sign in</span>
      </p>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="app-container" id="appContainer" style="display: none;">
  
  <!-- Header -->
  <div class="app-header">
    <h1 class="app-title">SmartNotes AI Pro</h1>
    <button class="logout-btn" onclick="app.logout()">Logout</button>
  </div>
  
  <!-- Note Input Section -->
  <div class="note-input-section">
    
    <!-- Voice Controls -->
    <div class="voice-controls">
      <button class="voice-button" id="voiceButton" onclick="app.toggleVoiceAI()">🎙️</button>
      <div>
        <div class="voice-status" id="voiceStatus">Click to start voice input</div>
        <div style="font-size: 0.75rem; color: var(--text-muted);">Powered by Web Speech API</div>
      </div>
    </div>
    
    <!-- Text Input -->
    <textarea 
      class="note-input" 
      id="noteInput" 
      placeholder="Type your note here or use voice input above..."
      maxlength="2000"
      oninput="updateCharCount()"
    ></textarea>
    
    <!-- Input Actions -->
    <div class="input-actions">
      <div class="quick-buttons">
        <button class="quick-btn" onclick="addQuickPrefix('📋 TODO: ')">Todo</button>
        <button class="quick-btn" onclick="addQuickPrefix('🚨 URGENT: ')">Urgent</button>
        <button class="quick-btn" onclick="addQuickPrefix('🤝 MEETING: ')">Meeting</button>
        <button class="quick-btn" onclick="addQuickPrefix('💡 IDEA: ')">Idea</button>
      </div>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <span class="char-count" id="charCount">0 / 2000</span>
        <button class="add-note-btn" onclick="app.addNote()">Add Note</button>
      </div>
    </div>
    
  </div>
  
  <!-- Notes Container -->
  <div class="notes-container" id="notesContainer">
    <div style="text-align: center; color: var(--text-muted); padding: 3rem 1rem;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">🗣️</div>
      <h3 style="margin-bottom: 0.5rem;">No notes yet</h3>
      <p>Create your first note above or try voice input!</p>
    </div>
  </div>
  
</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

<script>
class SmartNotesApp {
  constructor() {
    this.currentUser = null;
    this.notes = [];
    this.speechRecognition = null;
    this.isListening = false;
    this.currentTranscript = '';
    
    this.initializeAuth();
    this.initializeVoiceAI();
  }
  
  // Auth Functions
  initializeAuth() {
    const savedUser = localStorage.getItem('smartnotes_user');
    
    if (savedUser) {
      this.currentUser = JSON.parse(savedUser);
      this.showApp();
    } else {
      this.showAuth();
    }
    
    // Setup form handlers
    document.getElementById('loginFormElement').addEventListener('submit', (e) => {
      e.preventDefault();
      this.login();
    });
    
    document.getElementById('signupFormElement').addEventListener('submit', (e) => {
      e.preventDefault();
      this.signup();
    });
  }
  
  showAuth() {
    document.getElementById('authContainer').style.display = 'flex';
    document.getElementById('appContainer').style.display = 'none';
  }
  
  showApp() {
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    this.loadUserNotes();
  }
  
  login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    
    // Get users from localStorage
    const users = JSON.parse(localStorage.getItem('smartnotes_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
      this.currentUser = user;
      localStorage.setItem('smartnotes_user', JSON.stringify(user));
      this.showNotification('Welcome back!', 'success');
      this.showApp();
    } else {
      this.showNotification('Invalid email or password', 'error');
    }
  }
  
  signup() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    
    // Get existing users
    const users = JSON.parse(localStorage.getItem('smartnotes_users') || '[]');
    
    // Check if email already exists
    if (users.find(u => u.email === email)) {
      this.showNotification('Email already registered', 'error');
      return;
    }
    
    // Create new user
    const newUser = {
      id: Date.now().toString(),
      name: name,
      email: email,
      password: password,
      created: new Date().toISOString()
    };
    
    users.push(newUser);
    localStorage.setItem('smartnotes_users', JSON.stringify(users));
    
    this.currentUser = newUser;
    localStorage.setItem('smartnotes_user', JSON.stringify(newUser));
    
    this.showNotification('Account created successfully!', 'success');
    this.showApp();
  }
  
  logout() {
    localStorage.removeItem('smartnotes_user');
    this.currentUser = null;
    this.notes = [];
    this.stopVoiceAI();
    this.showAuth();
    
    // Clear forms
    document.getElementById('loginFormElement').reset();
    document.getElementById('signupFormElement').reset();
  }
  
  // Voice AI Functions (Web Speech API)
  initializeVoiceAI() {
    // Check for Web Speech API support
    this.speechRecognition = null;
    this.isListening = false;
    
    if ('webkitSpeechRecognition' in window) {
      this.speechRecognition = new webkitSpeechRecognition();
    } else if ('SpeechRecognition' in window) {
      this.speechRecognition = new SpeechRecognition();
    }
    
    if (this.speechRecognition) {
      this.setupSpeechRecognition();
    }
  }
  
  setupSpeechRecognition() {
    this.speechRecognition.continuous = true;
    this.speechRecognition.interimResults = true;
    this.speechRecognition.lang = 'en-US';
    
    this.speechRecognition.onstart = () => {
      this.isListening = true;
      this.updateVoiceUI(true);
      this.showNotification('🎙️ Listening... Speak now!', 'info');
    };
    
    this.speechRecognition.onresult = (event) => {
      let finalTranscript = '';
      let interimTranscript = '';
      
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        
        if (event.results[i].isFinal) {
          finalTranscript += transcript + ' ';
        } else {
          interimTranscript += transcript;
        }
      }
      
      // Update the input field with interim results
      const noteInput = document.getElementById('noteInput');
      if (finalTranscript || interimTranscript) {
        noteInput.value = (this.currentTranscript || '') + finalTranscript + interimTranscript;
        updateCharCount();
      }
      
      // Store final transcript
      if (finalTranscript) {
        this.currentTranscript = (this.currentTranscript || '') + finalTranscript;
      }
    };
    
    this.speechRecognition.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      let errorMessage = 'Voice recognition error: ';
      
      switch (event.error) {
        case 'no-speech':
          errorMessage += 'No speech detected. Try speaking louder.';
          break;
        case 'audio-capture':
          errorMessage += 'Microphone not accessible.';
          break;
        case 'not-allowed':
          errorMessage += 'Microphone permission denied.';
          break;
        case 'network':
          errorMessage += 'Network error. Check your connection.';
          break;
        default:
          errorMessage += event.error;
      }
      
      this.showNotification(errorMessage, 'error');
      this.stopVoiceAI();
    };
    
    this.speechRecognition.onend = () => {
      this.isListening = false;
      this.updateVoiceUI(false);
      
      if (this.currentTranscript && this.currentTranscript.trim()) {
        this.showNotification(`🎤 Voice input complete: "${this.currentTranscript.substring(0, 50)}..."`, 'success');
      }
    };
  }
  
  toggleVoiceAI() {
    if (!this.speechRecognition) {
      this.showNotification('Voice AI not supported on this browser. Try Chrome or Safari.', 'error');
      return;
    }
    
    if (this.isListening) {
      this.stopVoiceAI();
    } else {
      this.startVoiceAI();
    }
  }
  
  startVoiceAI() {
    if (!this.speechRecognition) return;
    
    try {
      this.currentTranscript = document.getElementById('noteInput').value;
      this.speechRecognition.start();
    } catch (error) {
      console.error('Error starting voice recognition:', error);
      this.showNotification('Could not start voice recognition', 'error');
    }
  }
  
  stopVoiceAI() {
    if (this.speechRecognition && this.isListening) {
      this.speechRecognition.stop();
    }
  }
  
  updateVoiceUI(isListening) {
    const button = document.getElementById('voiceButton');
    const status = document.getElementById('voiceStatus');
    
    if (isListening) {
      button.classList.add('listening');
      button.textContent = '⏹️';
      status.classList.add('listening');
      status.textContent = 'Listening... Click to stop';
    } else {
      button.classList.remove('listening');
      button.textContent = '🎙️';
      status.classList.remove('listening');
      status.textContent = 'Click to start voice input';
    }
  }
  
  // Notes Functions
  addNote() {
    const content = document.getElementById('noteInput').value.trim();
    
    if (!content) {
      this.showNotification('Please enter some content', 'error');
      return;
    }
    
    const note = {
      id: Date.now().toString(),
      content: content,
      created: new Date().toISOString(),
      updated: new Date().toISOString(),
      category: this.categorizeNote(content),
      type: this.currentTranscript && content.includes(this.currentTranscript.trim()) ? 'voice' : 'text'
    };
    
    this.notes.unshift(note);
    this.saveUserNotes();
    this.renderNotes();
    
    // Clear input
    document.getElementById('noteInput').value = '';
    this.currentTranscript = '';
    updateCharCount();
    
    this.showNotification('Note added successfully!', 'success');
  }
  
  deleteNote(noteId) {
    if (confirm('Are you sure you want to delete this note?')) {
      this.notes = this.notes.filter(note => note.id !== noteId);
      this.saveUserNotes();
      this.renderNotes();
      this.showNotification('Note deleted', 'success');
    }
  }
  
  categorizeNote(content) {
    const hour = new Date().getHours();
    
    if (hour < 12) return 'morning';
    if (hour < 17) return 'afternoon';
    return 'evening';
  }
  
  loadUserNotes() {
    const userNotes = JSON.parse(localStorage.getItem(`smartnotes_notes_${this.currentUser.id}`) || '[]');
    this.notes = userNotes;
    this.renderNotes();
  }
  
  saveUserNotes() {
    localStorage.setItem(`smartnotes_notes_${this.currentUser.id}`, JSON.stringify(this.notes));
  }
  
  renderNotes() {
    const container = document.getElementById('notesContainer');
    
    if (this.notes.length === 0) {
      container.innerHTML = `
        <div style="text-align: center; color: var(--text-muted); padding: 3rem 1rem;">
          <div style="font-size: 3rem; margin-bottom: 1rem;">🗣️</div>
          <h3 style="margin-bottom: 0.5rem;">No notes yet</h3>
          <p>Create your first note above or try voice input!</p>
        </div>
      `;
      return;
    }
    
    container.innerHTML = this.notes.map(note => `
      <div class="note-item ${note.type === 'voice' ? 'voice' : ''}">
        <div class="note-header">
          <div class="note-meta">
            ${note.type === 'voice' ? '<span class="note-type">Voice</span>' : ''}
            <span>${new Date(note.created).toLocaleDateString()}</span>
            <span>${new Date(note.created).toLocaleTimeString()}</span>
            <span>${note.category}</span>
          </div>
          <div class="note-actions">
            <button class="note-action-btn delete-btn" onclick="app.deleteNote('${note.id}')">Delete</button>
          </div>
        </div>
        <div class="note-content">${this.formatNoteContent(note.content)}</div>
      </div>
    `).join('');
  }
  
  formatNoteContent(content) {
    // Basic text formatting
    return content
      .replace(/\n/g, '<br>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>');
  }
  
  // Utility Functions
  showNotification(message, type = 'info') {
    const notification = document.getElementById('notification');
    notification.textContent = message;
    notification.className = `notification ${type}`;
    notification.classList.add('show');
    
    setTimeout(() => {
      notification.classList.remove('show');
    }, 4000);
  }
}

// Global Functions
let app;

document.addEventListener('DOMContentLoaded', () => {
  app = new SmartNotesApp();
  
  // Add demo account if not exists
  const users = JSON.parse(localStorage.getItem('smartnotes_users') || '[]');
  if (!users.find(u => u.email === 'demo@smartnotes.com')) {
    users.push({
      id: 'demo',
      name: 'Demo User',
      email: 'demo@smartnotes.com',
      password: 'demo123',
      created: new Date().toISOString()
    });
    localStorage.setItem('smartnotes_users', JSON.stringify(users));
  }
});

function showLogin() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('signupForm').style.display = 'none';
}

function showSignup() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
}

function updateCharCount() {
  const input = document.getElementById('noteInput');
  const counter = document.getElementById('charCount');
  const length = input.value.length;
  counter.textContent = `${length} / 2000`;
  
  if (length > 1800) {
    counter.style.color = 'var(--warning)';
  } else {
    counter.style.color = 'var(--text-muted)';
  }
}

function addQuickPrefix(prefix) {
  const input = document.getElementById('noteInput');
  input.value = prefix + input.value;
  input.focus();
  updateCharCount();
}
</script>
